server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: billing-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/irms}
    username: ${SPRING_DATASOURCE_USERNAME:billing_user}
    password: ${SPRING_DATASOURCE_PASSWORD:billing_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: billing_schema

  flyway:
    enabled: true
    schemas: billing_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:irms-super-secret-key-change-in-production-must-be-at-least-256-bits-long}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

order-service:
  url: ${ORDER_SERVICE_URL:http://localhost:8083}

billing:
  vat-rate: ${VAT_RATE:0.10}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.irms.billing: DEBUG
