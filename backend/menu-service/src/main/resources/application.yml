server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: menu-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/irms}
    username: ${SPRING_DATASOURCE_USERNAME:menu_user}
    password: ${SPRING_DATASOURCE_PASSWORD:menu_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: menu_schema

  flyway:
    enabled: true
    schemas: menu_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:irms-super-secret-key-change-in-production-must-be-at-least-256-bits-long}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.irms.menu: DEBUG
